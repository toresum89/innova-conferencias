services:
  - type: web
    name: innova-conferences
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_KEY
        value: innova2026
      - key: DATABASE_URL
        fromDatabase:
          name: innova-conferences-db
          property: connectionString

databases:
  - name: innova-conferences-db
    plan: free
